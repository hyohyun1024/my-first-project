<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영업 실적 대시보드</title>
  <script src="chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      color: #1a1a1a;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── 상단 네비게이션 ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 32px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #f4501e;
      letter-spacing: -0.5px;
    }
    .topbar-sub {
      font-size: 0.78rem;
      color: #999;
      margin-left: 4px;
    }

    /* ── 헤더 ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 20px 32px 0;
    }
    .header-inner {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
    }
    .header-logo {
      font-size: 1.7rem;
      font-weight: 900;
      color: #f4501e;
      letter-spacing: -1px;
      line-height: 1;
    }
    .header-title-block h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .header-title-block p {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 2px;
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 10px 22px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active {
      color: #1a1a1a;
      font-weight: 700;
      border-bottom: 2px solid #f4501e;
    }

    /* ── 본문 ── */
    .main {
      padding: 24px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 기준일 */
    .date-label {
      text-align: right;
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 16px;
    }

    /* ── KPI 카드 ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      padding: 20px 24px;
    }
    .kpi-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .kpi-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: #1a1a1a;
    }
    .kpi-value.orange { color: #f4501e; }
    .kpi-value span {
      font-size: 1rem;
      font-weight: 500;
      color: #888;
      margin-left: 3px;
    }
    .kpi-sub {
      margin-top: 8px;
      font-size: 0.72rem;
      color: #bbb;
    }

    /* ── 섹션 ── */
    .section {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 4px;
      height: 15px;
      background: #f4501e;
      border-radius: 2px;
      display: inline-block;
    }
    .section-badge {
      font-size: 0.72rem;
      color: #f4501e;
      background: #fff3f0;
      border: 1px solid #ffd5cb;
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 600;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* ── 하단 달성률 테이블 ── */
    .rate-table {
      width: 100%;
      border-collapse: collapse;
    }
    .rate-table th, .rate-table td {
      padding: 10px 16px;
      text-align: left;
      font-size: 0.8rem;
    }
    .rate-table th {
      color: #888;
      font-weight: 600;
      border-bottom: 1px solid #ebebeb;
      background: #fafafa;
    }
    .rate-table td {
      color: #1a1a1a;
      border-bottom: 1px solid #f3f3f3;
    }
    .rate-table tr:last-child td { border-bottom: none; }
    .rate-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rate-bar-bg {
      flex: 1;
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .rate-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #f4501e;
    }
    .rate-bar-fill.under { background: #ffbdad; }
    .rate-num {
      font-size: 0.8rem;
      font-weight: 700;
      width: 48px;
      text-align: right;
    }
    .rate-num.orange { color: #f4501e; }
    .rate-num.gray   { color: #bbb; }

    /* ── 푸터 ── */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      color: #ccc;
    }
    .footer span { color: #f4501e; font-weight: 700; }

    @media (max-width: 640px) {
      .main { padding: 16px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .kpi-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- 상단 네비게이션 -->
  <div class="topbar">
    <span class="topbar-logo">영업팀</span>
    <span class="topbar-sub">Sales Dashboard</span>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">SALES</div>
      <div class="header-title-block">
        <h1>영업 실적 대시보드</h1>
        <p>주식회사 Business Intelligence</p>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active">Overview</div>
      <div class="tab">월별 상세</div>
      <div class="tab">분기 분석</div>
    </div>
  </div>

  <!-- 본문 -->
  <div class="main">
    <div class="date-label">기준일 2024년 12월 31일</div>

    <!-- KPI 카드 -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">연간 총 목표</div>
        <div class="kpi-value" id="totalGoal">—</div>
        <div class="kpi-sub">12개월 누적 목표 금액</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">연간 총 실적</div>
        <div class="kpi-value orange" id="totalResult">—</div>
        <div class="kpi-sub">12개월 누적 실적 금액</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">연간 달성률</div>
        <div class="kpi-value orange" id="totalRate">—</div>
        <div class="kpi-sub">총 실적 / 총 목표</div>
      </div>
    </div>

    <!-- 막대 그래프 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">월별 목표 vs 실적 <small style="font-weight:400;color:#aaa;font-size:0.78rem;">(단위: 만원)</small></div>
        <span class="section-badge" id="achieveBadge">—</span>
      </div>
      <div class="chart-wrap">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <!-- 달성률 꺾은선 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">월별 달성률 추이</div>
        <span class="section-badge">목표 100%</span>
      </div>
      <div class="chart-wrap">
        <canvas id="lineChart"></canvas>
      </div>
    </div>

    <!-- 달성률 테이블 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">월별 달성률 상세</div>
      </div>
      <table class="rate-table">
        <thead>
          <tr>
            <th style="width:60px">월</th>
            <th style="width:90px">목표 (만원)</th>
            <th style="width:90px">실적 (만원)</th>
            <th>달성률</th>
            <th style="width:60px;text-align:right">비고</th>
          </tr>
        </thead>
        <tbody id="rateTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">ⓒ 2024 <span>영업팀</span> Sales Dashboard</div>

  <script>
    const data = {
      labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
      goal:   [5000, 5000, 5500, 5500, 6000, 6000, 6500, 6500, 7000, 7000, 7500, 8000],
      result: [4200, 5800, 6100, 4900, 6300, 7100, 6200, 5900, 7800, 8200, 7100, 9300],
    };

    const rate = data.goal.map((g, i) => +((data.result[i] / g) * 100).toFixed(1));
    const totalGoal   = data.goal.reduce((a, b) => a + b, 0);
    const totalResult = data.result.reduce((a, b) => a + b, 0);
    const totalRate   = ((totalResult / totalGoal) * 100).toFixed(1);

    document.getElementById('totalGoal').innerHTML   = `${(totalGoal/10000).toFixed(1)}억 <span>만원</span>`;
    document.getElementById('totalResult').innerHTML = `${(totalResult/10000).toFixed(1)}억 <span>만원</span>`;
    document.getElementById('totalRate').innerHTML   = `${totalRate}<span>%</span>`;
    document.getElementById('achieveBadge').textContent = `목표 달성 ${rate.filter(r => r >= 100).length}개월`;

    // 달성률 테이블
    const tbody = document.getElementById('rateTableBody');
    data.labels.forEach((label, i) => {
      const r = rate[i];
      const over = r >= 100;
      tbody.innerHTML += `
        <tr>
          <td><strong>${label}</strong></td>
          <td>${data.goal[i].toLocaleString()}</td>
          <td style="color:${over ? '#f4501e' : '#1a1a1a'};font-weight:${over ? '700' : '400'}">${data.result[i].toLocaleString()}</td>
          <td>
            <div class="rate-bar-wrap">
              <div class="rate-bar-bg">
                <div class="rate-bar-fill ${over ? '' : 'under'}" style="width:${Math.min(r, 130)/1.3}%"></div>
              </div>
              <span class="rate-num ${over ? 'orange' : 'gray'}">${r}%</span>
            </div>
          </td>
          <td style="text-align:right;font-size:0.72rem;color:${over ? '#f4501e' : '#bbb'}">${over ? '✓ 달성' : '미달'}</td>
        </tr>`;
    });

    const ORANGE      = '#f4501e';
    const ORANGE_SOFT = 'rgba(244,80,30,0.15)';
    const GRAY_DARK   = '#333333';
    const GRAY_LIGHT  = '#e0e0e0';
    const TICK_COLOR  = '#999';
    const GRID_COLOR  = '#f0f0f0';

    const commonScales = {
      x: {
        ticks: { color: TICK_COLOR, font: { size: 11 } },
        grid:  { color: GRID_COLOR },
        border:{ color: GRID_COLOR },
      },
      y: {
        ticks: { color: TICK_COLOR, font: { size: 11 } },
        grid:  { color: GRID_COLOR },
        border:{ color: GRID_COLOR },
      },
    };
    const commonTooltip = {
      backgroundColor: '#fff',
      borderColor: '#e0e0e0',
      borderWidth: 1,
      titleColor: '#1a1a1a',
      bodyColor: '#666',
      padding: 12,
      cornerRadius: 6,
      boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
    };

    // 막대 그래프
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: data.labels,
        datasets: [
          {
            label: '목표',
            data: data.goal,
            backgroundColor: '#e8e8e8',
            borderColor: '#d0d0d0',
            borderWidth: 1,
            borderRadius: 4,
            borderSkipped: false,
          },
          {
            label: '실적',
            data: data.result,
            backgroundColor: ORANGE,
            borderColor: ORANGE,
            borderWidth: 0,
            borderRadius: 4,
            borderSkipped: false,
          },
        ],
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#888', boxRadius: 3, font: { size: 11 }, padding: 20 },
          },
          tooltip: {
            ...commonTooltip,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 만원`,
            },
          },
        },
        scales: {
          ...commonScales,
          y: {
            ...commonScales.y,
            ticks: {
              ...commonScales.y.ticks,
              callback: v => (v / 10000).toFixed(1) + '억',
            },
          },
        },
      },
    });

    // 꺾은선 그래프
    new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [
          {
            label: '달성률',
            data: rate,
            borderColor: ORANGE,
            backgroundColor: ORANGE_SOFT,
            pointBackgroundColor: rate.map(r => r >= 100 ? ORANGE : '#ccc'),
            pointBorderColor:     rate.map(r => r >= 100 ? ORANGE : '#ccc'),
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            borderWidth: 2,
            fill: true,
            tension: 0.35,
          },
          {
            label: '목표 (100%)',
            data: Array(12).fill(100),
            borderColor: '#ddd',
            borderDash: [5, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#888', boxRadius: 3, font: { size: 11 }, padding: 20 },
          },
          tooltip: {
            ...commonTooltip,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%`,
            },
          },
        },
        scales: {
          ...commonScales,
          y: {
            ...commonScales.y,
            min: 70,
            ticks: {
              ...commonScales.y.ticks,
              callback: v => v + '%',
            },
          },
        },
      },
    });
  </script>
</body>
</html>
